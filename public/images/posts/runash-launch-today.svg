<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="1600" y1="0" x2="0" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FB7185"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <radialGradient id="blob1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1320 250) rotate(150) scale(580 380)">
      <stop stop-color="#FFE4A3" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#FFE4A3" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(360 680) rotate(-20) scale(700 420)">
      <stop stop-color="#F97316" stop-opacity="0.9"/>
