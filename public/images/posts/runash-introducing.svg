<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <radialGradient id="blob1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1280 190) rotate(160) scale(640 360)">
      <stop stop-color="#C4B5FD" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#C4B5FD" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(340 710) rotate(-30) scale(560 360)">
      <stop stop-color="#6366F1" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <ellipse cx="1280" cy="190" rx="640" ry="360" fill="url(#blob1)" filter="url(#soft)"/>
  <ellipse cx="340" cy="710" rx="560" ry="360" fill="url(#blob2)" filter="url(#soft)"/>
  <text x="800" y="470" text-anchor="middle" fill="white" font-family="Inter, Arial, sans-serif" font-size="74" font-weight="700">Introducing RunAsh</text>
</svg>
